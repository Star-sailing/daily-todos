<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#4A6CF7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Daily Todos">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <title>Daily Todos</title>
</head>
<body>

  <!-- ==================== 登录页 ==================== -->
  <div id="authPage" class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#4A6CF7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
      <h1 class="auth-title">Daily Todos</h1>
      <p class="auth-subtitle">日常待办，多设备同步</p>

      <!-- 登录表单 -->
      <form id="loginForm" class="auth-form">
        <div class="input-group">
          <label for="loginEmail">邮箱</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="input-group">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" placeholder="至少6位密码" required autocomplete="current-password" minlength="6">
        </div>
        <p id="loginError" class="auth-error"></p>
        <button type="submit" class="btn btn-primary btn-full">登 录</button>
      </form>

      <!-- 注册表单（初始隐藏） -->
      <form id="registerForm" class="auth-form hidden">
        <div class="input-group">
          <label for="registerEmail">邮箱</label>
          <input type="email" id="registerEmail" placeholder="your@email.com" required autocomplete="email">
        </div>
        <div class="input-group">
          <label for="registerPassword">密码</label>
          <input type="password" id="registerPassword" placeholder="至少6位密码" required autocomplete="new-password" minlength="6">
        </div>
        <div class="input-group">
          <label for="registerConfirm">确认密码</label>
          <input type="password" id="registerConfirm" placeholder="再次输入密码" required autocomplete="new-password" minlength="6">
        </div>
        <p id="registerError" class="auth-error"></p>
        <button type="submit" class="btn btn-primary btn-full">注 册</button>
      </form>

      <p class="auth-switch">
        <span id="switchText">还没有账号？</span>
        <button id="switchAuthBtn" class="btn-link">去注册</button>
      </p>
    </div>
  </div>

  <!-- ==================== 主应用 ==================== -->
  <div id="appPage" class="app-page hidden">
    <!-- 顶部栏 -->
    <header class="app-header">
      <div class="header-left">
        <span id="headerDate" class="header-date">2026年5月29日 星期五</span>
      </div>
      <button id="logoutBtn" class="btn-icon" title="登出">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </header>

    <!-- 内容区 -->
    <main class="app-content">
      <!-- 今日视图 -->
      <section id="tabToday" class="tab-panel">
        <!-- 添加任务栏 -->
        <div class="add-bar">
          <input type="text" id="todoInput" class="add-input" placeholder="添加新的待办..." maxlength="200" autocomplete="off">
          <button id="addBtn" class="btn btn-add">添加</button>
        </div>
        <!-- 任务列表 -->
        <div id="todayList" class="todo-list"></div>
        <!-- 空状态 -->
        <div id="todayEmpty" class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
          <p>今天还没有待办<br>点击上方输入框添加一个吧</p>
        </div>
      </section>

      <!-- 历史视图 -->
      <section id="tabHistory" class="tab-panel hidden">
        <!-- 历史工具栏 -->
        <div class="history-toolbar">
          <div class="history-mode-toggle">
            <button id="modeCollapse" class="mode-btn active">折叠</button>
            <button id="modeExpand" class="mode-btn">展开</button>
          </div>
          <input type="date" id="historyDatePicker" class="history-date-picker" title="跳转到指定日期">
        </div>
        <div id="historyList" class="history-list"></div>
        <div id="historyEmpty" class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <p>还没有历史记录<br>完成任务后这里会出现记录</p>
        </div>
      </section>

      <!-- 日历视图 -->
      <section id="tabCalendar" class="tab-panel hidden">
        <div class="calendar-nav">
          <button id="calPrev" class="btn-icon" aria-label="上一月">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span id="calMonthLabel" class="cal-month-label">2026年5月</span>
          <button id="calNext" class="btn-icon" aria-label="下一月">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="calendar-weekdays">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
        <div class="calendar-legend">
          <span class="legend-item"><span class="legend-dot dot-blue"></span> 未来计划</span>
          <span class="legend-item"><span class="legend-dot dot-green"></span> 全部完成</span>
          <span class="legend-item"><span class="legend-dot dot-orange"></span> 有未完成</span>
        </div>
        <!-- 月度统计 -->
        <div id="calendarStats" class="calendar-stats">
          <h3 id="statsMonthLabel">本月统计</h3>
          <div class="stats-row">
            <div class="stat-card stat-total">
              <div class="stat-num" id="statTotal">0</div>
              <div class="stat-label">总任务</div>
            </div>
            <div class="stat-card stat-done">
              <div class="stat-num" id="statDone">0</div>
              <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card stat-undone">
              <div class="stat-num" id="statUndone">0</div>
              <div class="stat-label">未完成</div>
            </div>
            <div class="stat-card stat-rate">
              <div class="stat-num" id="statRate">-</div>
              <div class="stat-label">完成率</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- 底部Tab栏 -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="tabToday">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span>今日</span>
      </button>
      <button class="tab-btn" data-tab="tabHistory">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>历史</span>
      </button>
      <button class="tab-btn" data-tab="tabCalendar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>日历</span>
      </button>
    </nav>
  </div>

  <!-- ==================== 日期详情弹窗 ==================== -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 id="modalTitle" class="modal-title"></h2>
        <button id="modalClose" class="btn-icon" aria-label="关闭">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="modalAddBar" class="add-bar" style="margin: 0 16px 12px;">
        <input type="text" id="modalInput" class="add-input" placeholder="添加待办..." maxlength="200" autocomplete="off">
        <button id="modalAddBtn" class="btn btn-add">添加</button>
      </div>
      <div id="modalList" class="todo-list" style="padding: 0 16px;"></div>
      <div id="modalEmpty" class="empty-state" style="padding: 24px 0;">
        <p>这一天还没有待办</p>
      </div>
    </div>
  </div>

  <!-- ==================== Toast 容器 ==================== -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 应用逻辑 -->
  <script src="app.js"></script>
</body>
</html>
